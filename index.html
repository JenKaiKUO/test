<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Sax AI - Trombonebone API Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/midi-player-js@2.1.0/build/midiplayer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/combine/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #111; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        .main-ui { position: fixed; bottom: 30px; width: 100%; text-align: center; z-index: 10; }
        #status_msg { font-size: 1.1rem; color: var(--gold); margin-bottom: 10px; min-height: 2em; }
        .btn { padding: 10px 20px; background: var(--gold); border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; justify-content: center; align-items: center; }
        #settings-overlay.show { display: flex; }
        .panel { background: #222; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); width: 300px; }
        select { width: 100%; padding: 10px; margin: 10px 0; background: #333; color: white; border: 1px solid #444; }
        canvas { width: 100vw; height: 100vh; transform: rotateY(180deg); }
    </style>
</head>
<body>

    <button class="btn" style="position:fixed; top:20px; right:20px; z-index:100" onclick="toggleSettings(true)">⚙️ 設定歌曲</button>

    <div id="settings-overlay">
        <div class="panel">
            <h3>☁️ iMuse 資料庫</h3>
            <select id="midi-select"><option value="">正在載入 API 清單...</option></select>
            <p style="font-size: 12px; color: #888;">若無法載入，代表 iMuse API 目前拒絕外部連線。</p>
            <button class="btn" style="width:100%" onclick="toggleSettings(false)">關閉</button>
        </div>
    </div>

    <canvas id="output_canvas"></canvas>
    <video id="webcam" style="display:none" autoplay playsinline></video>

    <div class="main-ui">
        <div id="status_msg">正在初始化系統...</div>
    </div>

    <script type="module">
        // ---------------------------------------------------------
        // 1. 完全照搬 Trombonebone 的 midiapi.js 邏輯
        // ---------------------------------------------------------
        const API_BASE = "https://imuse.ncnu.edu.tw/Midi-library/api/midis";
        // 加上轉運站以避開 GitHub Pages 的 CORS 阻擋
        const PROXY = "https://api.allorigins.win/raw?url=";

        async function fetchMidiList() {
            try {
                const response = await fetch(PROXY + encodeURIComponent(API_BASE));
                if (!response.ok) throw new Error("API 回傳錯誤：" + response.status);
                const data = await response.json();
                return data.items || [];
            } catch (err) {
                console.error("❌ 無法抓取 MIDI 清單：", err);
                return [];
            }
        }

        async function downloadMidiFile(id) {
            const downloadUrl = `${API_BASE}/${id}/download`;
            try {
                const response = await fetch(PROXY + encodeURIComponent(downloadUrl));
                if (!response.ok) throw new Error("下載失敗：" + response.status);
                return await response.arrayBuffer(); // 轉成 ArrayBuffer 供解析
            } catch (err) {
                console.error("❌ 下載 MIDI 錯誤：", err);
                throw err;
            }
        }

        // ---------------------------------------------------------
        // 2. 主程式整合
        // ---------------------------------------------------------
        let audioCtx, saxPlayer, noteQueue = [], currentIndex = 0;

        // 初始化音訊與 MediaPipe
        async function initEngine() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            saxPlayer = await Soundfont.instrument(audioCtx, 'alto_sax');
            document.getElementById('status_msg').innerText = "系統就緒，請選擇歌曲";
            startCamera();
        }

        // 載入歌單到 Select
        async function loadSongsToUI() {
            const items = await fetchMidiList();
            const select = document.getElementById('midi-select');
            if (items.length === 0) {
                select.innerHTML = '<option value="">❌ API 連線失敗 (522)</option>';
                return;
            }
            select.innerHTML = '<option value="">-- 請選擇歌曲 --</option>';
            items.forEach(item => {
                const opt = new Option(item.title || item.filename, item.id);
                select.add(opt);
            });
        }

        // 處理選單選擇
        document.getElementById('midi-select').onchange = async (e) => {
            const id = e.target.value;
            if (!id) return;

            await initEngine();
            const msg = document.getElementById('status_msg');
            msg.innerText = "⏳ 正在下載 MIDI 檔案...";

            try {
                const buffer = await downloadMidiFile(id);
                const player = new MidiPlayer.Player();
                player.loadArrayBuffer(buffer);
                
                noteQueue = [];
                player.getEvents().forEach(track => {
                    track.forEach(ev => {
                        if (ev.name === 'Note on' && ev.velocity > 0) noteQueue.push(ev.noteNumber);
                    });
                });

                currentIndex = 0;
                msg.innerText = `✅ 載入成功！捏合手指開始演奏`;
                toggleSettings(false);
            } catch (err) {
                msg.innerHTML = `<span style="color:red">連線失敗 (522/520)</span><br>iMuse 伺服器拒絕了轉運請求。`;
            }
        };

        // MediaPipe 手勢控制 (捏合手指演奏)
        function startCamera() {
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
            hands.onResults(res => {
                const canvas = document.getElementById('output_canvas');
                const ctx = canvas.getContext('2d');
                ctx.save();
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(res.image, 0,0,canvas.width,canvas.height);
                if (res.multiHandLandmarks?.[0]) {
                    const lm = res.multiHandLandmarks[0];
                    const dist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                    if (dist < 0.05) { // 捏合觸發
                        if (!window.isPinching) {
                            if (noteQueue[currentIndex]) {
                                saxPlayer.play(noteQueue[currentIndex]);
                                currentIndex++;
                            }
                            window.isPinching = true;
                        }
                    } else { window.isPinching = false; }
                }
                ctx.restore();
            });
            const cam = new Camera(document.getElementById('webcam'), {
                onFrame: async () => await hands.send({image: document.getElementById('webcam')}),
                width: 640, height: 480
            });
            cam.start();
            document.getElementById('output_canvas').width = 640;
            document.getElementById('output_canvas').height = 480;
        }

        window.toggleSettings = (show) => {
            document.getElementById('settings-overlay').classList.toggle('show', show);
        };

        loadSongsToUI();
    </script>
</body>
</html>
