<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Saxophone AI - iMuse API Official Version</title>
    <script src="https://cdn.jsdelivr.net/npm/midi-player-js@2.1.0/build/midiplayer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/combine/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        #settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; z-index: 1000; justify-content: center; align-items: center; }
        .panel { background: #2d2d2d; padding: 25px; border-radius: 15px; border: 2px solid var(--gold); width: 320px; text-align: center; }
        .main-ui { position: fixed; bottom: 30px; width: 100%; text-align: center; z-index: 10; }
        #status_msg { font-size: 1.1rem; color: var(--gold); min-height: 2.5em; text-shadow: 2px 2px 4px #000; }
        .btn { padding: 10px 20px; background: var(--gold); border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #000; }
        select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; background: #333; color: white; border: 1px solid #555; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: rotateY(180deg); }
    </style>
</head>
<body>

    <button class="btn" style="position:fixed; top:20px; right:20px; z-index:100" onclick="toggleSettings(true)">⚙️ 歌曲選單</button>

    <div id="settings-overlay">
        <div class="panel">
            <h2 style="color:var(--gold); margin-top:0;">iMuse 雲端歌單</h2>
            <select id="midi-select"><option value="">正在載入官方列表...</option></select>
            
            <div id="fail-area" style="display:none; margin:10px 0; padding:10px; background:#442222; border-radius:5px;">
                <p style="font-size:12px; color:#ff8888; margin:0;">連線逾時 (522/404)</p>
                <a id="direct-link" href="#" target="_blank" style="color:var(--gold); text-decoration:none; font-weight:bold;">[手動下載檔案]</a>
            </div>

            <input type="file" id="local-upload" accept=".mid,.midi" style="display:none">
            <button class="btn" style="width:100%; background:#555; color:white; margin-top:10px;" onclick="document.getElementById('local-upload').click()">📂 上傳本機 MIDI</button>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="toggleSettings(false)">關閉</button>
        </div>
    </div>

    <canvas id="output_canvas"></canvas>
    <video id="webcam" style="display:none" autoplay playsinline></video>

    <div class="main-ui">
        <div id="status_msg">正在初始化系統...</div>
        <div style="width:80%; height:4px; background:#333; margin:0 auto;"><div id="progress-fill" style="width:0%; height:100%; background:var(--gold);"></div></div>
    </div>

    <script type="module">
        const PROXY = "https://api.allorigins.win/raw?url=";
        const API_LIST = "https://imuse.ncnu.edu.tw/Midi-library/api/midis";
        const DOWNLOAD_BASE = "https://imuse.ncnu.edu.tw/Midi-library/api/midis/";

        let audioCtx, saxPlayer, noteQueue = [], currentIndex = 0, isPinching = false;

        // --- 符合文檔格式的列表獲取 ---
        async function fetchSongs() {
            const select = document.getElementById('midi-select');
            try {
                const response = await fetch(PROXY + encodeURIComponent(API_LIST));
                const text = await response.text();
                
                // 檢查是否為 HTML 報錯頁面
                if (text.trim().startsWith("<!DOCTYPE")) throw new Error("Proxy 回傳 HTML 錯誤");

                const data = JSON.parse(text);
                const items = data.items || []; // 依據 docs: items 是一個陣列

                select.innerHTML = '<option value="">-- 請選擇歌曲 --</option>';
                items.forEach(item => {
                    const opt = new Option(item.title || item.filename, item.id);
                    opt.dataset.filename = item.filename;
                    select.add(opt);
                });
            } catch (err) {
                console.error("解析 API 失敗:", err);
                select.innerHTML = '<option value="">❌ API 連線失敗 (522)</option>';
                // 顯示手動模式提示
            }
        }

        // --- 符合文檔的下載邏輯 ---
        async function loadMidi(id, filename) {
            if (!id) return;
            if (!audioCtx) await initEngine();

            const msg = document.getElementById('status_msg');
            const failArea = document.getElementById('fail-area');
            const directLink = document.getElementById('direct-link');
            
            // 下載連結格式: /api/midis/{id}/download
            const downloadUrl = `${DOWNLOAD_BASE}${id}/download`;
            directLink.href = downloadUrl;
            failArea.style.display = "none";
            msg.innerText = `⏳ 正在獲取：${filename}...`;

            try {
                const res = await fetch(PROXY + encodeURIComponent(downloadUrl));
                if (!res.ok) throw new Error("Download 522");

                const buffer = await res.arrayBuffer();
                if (buffer.byteLength < 500) throw new Error("Invalid Buffer");

                parseMidi(buffer, filename);
                toggleSettings(false);
            } catch (e) {
                msg.innerHTML = `<span style="color:#ff6666">連線失敗</span><br>伺服器無回應，請手動下載後上傳。`;
                failArea.style.display = "block";
            }
        }

        function parseMidi(buffer, title) {
            const player = new MidiPlayer.Player();
            player.loadArrayBuffer(buffer);
            noteQueue = [];
            player.getEvents().forEach(track => {
                track.forEach(ev => { if(ev.name === 'Note on' && ev.velocity > 0) noteQueue.push(ev.noteNumber); });
            });
            currentIndex = 0;
            document.getElementById('status_msg').innerText = `✅ 就緒：《${title}》`;
        }

        async function initEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            saxPlayer = await Soundfont.instrument(audioCtx, 'alto_sax');
            startCamera();
        }

        function triggerNote() {
            if (currentIndex >= noteQueue.length) return;
            saxPlayer.play(noteQueue[currentIndex], audioCtx.currentTime, { gain: 1.5 });
            currentIndex++;
            document.getElementById('progress-fill').style.width = (currentIndex / noteQueue.length * 100) + '%';
        }

        function startCamera() {
            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
            hands.onResults(res => {
                const canvas = document.getElementById('output_canvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(res.image, 0,0,canvas.width,canvas.height);
                if (res.multiHandLandmarks?.[0]) {
                    const lm = res.multiHandLandmarks[0];
                    if (Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y) < 0.05) {
                        if(!isPinching) { triggerNote(); isPinching = true; }
                    } else { isPinching = false; }
                }
            });
            new Camera(document.getElementById('webcam'), { 
                onFrame: async () => await hands.send({image: document.getElementById('webcam')}), 
                width: 640, height: 480 
            }).start();
        }

        window.toggleSettings = (s) => document.getElementById('settings-overlay').style.display = s ? 'flex' : 'none';
        document.getElementById('midi-select').onchange = (e) => {
            const opt = e.target.options[e.target.selectedIndex];
            loadMidi(e.target.value, opt.dataset.filename);
        };
        document.getElementById('local-upload').onchange = (e) => {
            if(!audioCtx) initEngine();
            const reader = new FileReader();
            reader.onload = (ev) => { parseMidi(ev.target.result, "本機檔案"); toggleSettings(false); };
            reader.readAsArrayBuffer(e.target.files[0]);
        };
        fetchSongs();
    </script>
</body>
</html>
