<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Web Saxophone AI - Stable Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/midi-player-js@2.1.0/build/midiplayer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/combine/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #121212; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        /* UI 面板 */
        #settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; z-index: 1000; justify-content: center; align-items: center; }
        .panel { background: #252525; padding: 30px; border-radius: 20px; border: 2px solid var(--gold); width: 340px; text-align: center; }
        
        /* 視訊視窗 */
        #video-container { position: relative; width: 100vw; height: 100vh; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; transform: rotateY(180deg); }
        
        /* 狀態列 */
        .main-ui { position: fixed; bottom: 40px; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        #status_msg { font-size: 1.2rem; color: var(--gold); margin-bottom: 15px; text-shadow: 2px 2px 5px #000; }
        .progress-bar { width: 80%; max-width: 500px; height: 8px; background: #333; margin: 0 auto; border-radius: 4px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--gold); transition: 0.1s; }

        .btn { padding: 12px 24px; background: var(--gold); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; color: #000; pointer-events: auto; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #333; color: white; border: 1px solid #555; }
    </style>
</head>
<body>

    <button class="btn" style="position:fixed; top:20px; right:20px; z-index:100" onclick="document.getElementById('settings-overlay').style.display='flex'">⚙️ 設定歌曲</button>

    <div id="settings-overlay">
        <div class="panel">
            <h2 style="color:var(--gold); margin-top:0;">🎷 薩克斯風 AI</h2>
            
            <div style="text-align:left;">
                <label>☁️ 線上歌單 (iMuse):</label>
                <select id="midi-select">
                    <option value="">載入中...</option>
                </select>

                <p style="font-size: 12px; color: #888; margin-top: 5px;">* 若雲端載入失敗，請點選下方手動下載</p>
                <a id="manual-download" href="#" target="_blank" style="display:none; color:var(--gold); font-size: 14px; text-decoration: none;">[點我下載此歌曲]</a>

                <label style="display:block; margin-top:20px;">📂 下載後從此處上傳:</label>
                <input type="file" id="local-upload" accept=".mid,.midi">
            </div>

            <button class="btn" style="width:100%; margin-top:20px;" onclick="document.getElementById('settings-overlay').style.display='none'">開始演奏</button>
        </div>
    </div>

    <div id="video-container">
        <canvas id="output_canvas"></canvas>
        <video id="webcam" style="display:none" autoplay playsinline></video>
    </div>

    <div class="main-ui">
        <div id="status_msg">請選擇歌曲</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <script>
        let audioCtx, saxPlayer, noteQueue = [], currentIndex = 0, isPinching = false;
        const PROXY = "https://api.allorigins.win/raw?url=";
        const IMUSE_API = "https://imuse.ncnu.edu.tw/Midi-library/api/midis";

        // --- 1. 初始化 MIDI 列表 (仿 midiapi.js) ---
        async function fetchSongs() {
            const select = document.getElementById('midi-select');
            try {
                // 嘗試從 API 抓取列表，若失敗則使用預設清單
                const res = await fetch(PROXY + encodeURIComponent(IMUSE_API));
                const data = await res.json();
                const items = data.items || [];
                
                select.innerHTML = '<option value="">-- 請選擇歌曲 --</option>';
                items.forEach(item => {
                    let opt = new Option(item.title, item.id);
                    // 儲存檔名以便手動下載使用
                    opt.dataset.filename = item.filename;
                    select.add(opt);
                });
            } catch (e) {
                console.warn("API 抓取失敗，改用手動模式");
                select.innerHTML = '<option value="">(API 連線逾時)</option>';
            }
        }

        // --- 2. 核心：下載與解析 ---
        async function loadMidi(id, filename) {
            if (!audioCtx) await initEngine();
            
            const msg = document.getElementById('status_msg');
            msg.innerText = "⏳ 正在嘗試雲端下載...";
            
            const downloadLink = document.getElementById('manual-download');
            const targetUrl = `https://imuse.ncnu.edu.tw/Midi-library/${encodeURIComponent(filename)}`;
            
            // 更新手動下載連結，萬一 Proxy 失敗長輩可以點
            downloadLink.href = targetUrl;
            downloadLink.style.display = "block";

            try {
                const res = await fetch(PROXY + encodeURIComponent(targetUrl));
                if (!res.ok) throw new Error("522");
                const buffer = await res.arrayBuffer();
                parseMidi(buffer, filename);
                document.getElementById('settings-overlay').style.display = 'none';
            } catch (e) {
                msg.innerHTML = `<span style="color:#ff6666">⚠️ 雲端失敗 (522)</span><br>請點選「點我下載」後上傳。`;
            }
        }

        function parseMidi(buffer, title) {
            const player = new MidiPlayer.Player();
            player.loadArrayBuffer(buffer);
            noteQueue = [];
            player.getEvents().forEach(track => {
                track.forEach(ev => {
                    if (ev.name === 'Note on' && ev.velocity > 0) noteQueue.push(ev.noteNumber);
                });
            });
            currentIndex = 0;
            document.getElementById('status_msg').innerText = `✅ 就緒：《${title}》`;
        }

        // --- 3. 初始化音訊與 AI 手勢 ---
        async function initEngine() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            saxPlayer = await Soundfont.instrument(audioCtx, 'alto_sax');
            startCamera();
        }

        function triggerNote() {
            if (currentIndex >= noteQueue.length) return;
            saxPlayer.play(noteQueue[currentIndex], audioCtx.currentTime, { gain: 1.5 });
            currentIndex++;
            document.getElementById('progress-fill').style.width = (currentIndex / noteQueue.length) * 100 + '%';
        }

        function startCamera() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('output_canvas');
            const ctx = canvas.getContext('2d');
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });

            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
            hands.onResults(results => {
                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
                
                if (results.multiHandLandmarks?.[0]) {
                    const lm = results.multiHandLandmarks[0];
                    const dist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                    if (dist < 0.05) { // 捏合手指觸發
                        if (!isPinching) { triggerNote(); isPinching = true; }
                        ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(lm[8].x * canvas.width, lm[8].y * canvas.height, 15, 0, 7); ctx.fill();
                    } else { isPinching = false; }
                }
                ctx.restore();
            });

            new Camera(video, { onFrame: async () => await hands.send({image: video}), width: 640, height: 480 }).start();
            canvas.width = 640; canvas.height = 480;
        }

        // 事件監聽
        document.getElementById('midi-select').onchange = (e) => {
            const opt = e.target.options[e.target.selectedIndex];
            loadMidi(e.target.value, opt.dataset.filename);
        };

        document.getElementById('local-upload').onchange = (e) => {
            if (!audioCtx) initEngine();
            const reader = new FileReader();
            reader.onload = (ev) => {
                parseMidi(ev.target.result, "本機上傳檔案");
                document.getElementById('settings-overlay').style.display = 'none';
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        fetchSongs();
    </script>
</body>
</html>
