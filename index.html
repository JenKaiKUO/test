<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Saxophone AI - Final Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/midi-player-js@2.1.0/build/midiplayer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/combine/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        #settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 1000; justify-content: center; align-items: center; }
        #settings-overlay.show { display: flex; }
        .panel { background: #222; padding: 30px; border-radius: 15px; border: 2px solid var(--gold); width: 340px; text-align: center; }
        .main-ui { position: fixed; bottom: 40px; width: 100%; text-align: center; z-index: 10; }
        #status_msg { font-size: 1.1rem; color: var(--gold); margin-bottom: 10px; min-height: 3em; }
        .btn { padding: 12px 24px; background: var(--gold); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        select { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; background: #333; color: white; border: 1px solid #444; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: rotateY(180deg); }
    </style>
</head>
<body>

    <button class="btn" style="position:fixed; top:20px; right:20px; z-index:100" onclick="toggleSettings(true)">⚙️ 設定歌曲</button>

    <div id="settings-overlay">
        <div class="panel">
            <h2 style="color:var(--gold)">演奏設定</h2>
            <select id="midi-select"><option value="">載入中...</option></select>
            <p style="font-size: 0.8em; color: #888;">若線上載入失敗，請嘗試手動下載上傳</p>
            <input type="file" id="local-upload" accept=".mid,.midi" style="display:none">
            <button class="btn" style="background:#444; color:white; width:100%" onclick="document.getElementById('local-upload').click()">📂 上傳本機 MIDI</button>
            <hr style="border:0; border-top:1px solid #444; margin:20px 0;">
            <button class="btn" style="width:100%" onclick="toggleSettings(false)">開始</button>
        </div>
    </div>

    <canvas id="output_canvas"></canvas>
    <video id="webcam" style="display:none" autoplay playsinline></video>

    <div class="main-ui">
        <div id="status_msg">請開啟設定載入歌曲</div>
        <div style="width:80%; height:6px; background:#333; margin:0 auto; border-radius:3px;">
            <div id="progress-fill" style="width:0%; height:100%; background:var(--gold); transition:0.1s;"></div>
        </div>
    </div>

    <script type="module">
        const IMUSE_ROOT = "https://imuse.ncnu.edu.tw/Midi-library/";
        // 修正後的代理池
        const PROXIES = [
            "https://api.allorigins.win/raw?url=",
            "https://corsproxy.io/?"
        ];

        const songs = [
            { title: "朋友", file: "朋友.mid" },
            { title: "月亮代表我的心", file: "月亮代表我的心part1.mid" },
            { title: "祝你幸福", file: "祝你幸福.mid" },
            { title: "望春風", file: "望春風.mid" }
        ];

        let audioCtx, saxPlayer, noteQueue = [], currentIndex = 0, isPinching = false;

        async function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            saxPlayer = await Soundfont.instrument(audioCtx, 'alto_sax');
            startCamera();
        }

        async function loadCloudMidi(fileName) {
            if (!fileName) return;
            await initAudio();
            const msg = document.getElementById('status_msg');
            msg.innerText = `⏳ 嘗試多重代理載入...`;

            // ⚠️ 修正重點：不要對整個 URL 進行兩次編碼
            const targetUrl = IMUSE_ROOT + fileName; 
            
            for (let proxy of PROXIES) {
                try {
                    // 使用 URLSearchParams 或直接拼接，避免 %25 雙重編碼
                    const finalUrl = proxy + targetUrl + "&cb=" + Date.now();
                    console.log("正在嘗試代理：", finalUrl);
                    
                    const res = await fetch(finalUrl);
                    if (!res.ok) throw new Error("Status " + res.status);
                    
                    const buffer = await res.arrayBuffer();
                    if (buffer.byteLength < 500) throw new Error("Invalid Data");

                    parseMidi(buffer, fileName);
                    toggleSettings(false);
                    return;
                } catch (e) {
                    console.warn(`代理失敗：${proxy}`, e);
                }
            }

            msg.innerHTML = `<span style="color:#ff6666">連線逾時 (522/404)</span><br><a href="${targetUrl}" target="_blank" style="color:white;text-decoration:underline;">[點此手動下載]</a> 後點上傳`;
        }

        function parseMidi(buffer, title) {
            const player = new MidiPlayer.Player();
            player.loadArrayBuffer(buffer);
            noteQueue = [];
            player.getEvents().forEach(track => {
                track.forEach(ev => { if (ev.name === 'Note on' && ev.velocity > 0) noteQueue.push(ev.noteNumber); });
            });
            currentIndex = 0;
            document.getElementById('status_msg').innerText = `✅ 載入成功：${title}`;
        }

        function triggerNote() {
            if (currentIndex >= noteQueue.length) return;
            saxPlayer.play(noteQueue[currentIndex], audioCtx.currentTime, { gain: 1.5 });
            currentIndex++;
            document.getElementById('progress-fill').style.width = (currentIndex / noteQueue.length) * 100 + '%';
        }

        function startCamera() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
            });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
            hands.onResults(res => {
                const canvas = document.getElementById('output_canvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(res.image, 0,0,canvas.width,canvas.height);
                if (res.multiHandLandmarks?.[0]) {
                    const lm = res.multiHandLandmarks[0];
                    if (Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y) < 0.05) {
                        if (!isPinching) { triggerNote(); isPinching = true; }
                    } else { isPinching = false; }
                }
            });
            new Camera(document.getElementById('webcam'), { 
                onFrame: async () => await hands.send({image: document.getElementById('webcam')}), 
                width: 640, height: 480 
            }).start();
            document.getElementById('output_canvas').width = 640;
            document.getElementById('output_canvas').height = 480;
        }

        window.toggleSettings = (s) => document.getElementById('settings-overlay').classList.toggle('show', s);
        
        // 初始化選單
        const select = document.getElementById('midi-select');
        select.innerHTML = '<option value="">-- 選擇歌曲 --</option>';
        songs.forEach(s => select.add(new Option(s.title, s.file)));
        select.onchange = (e) => loadCloudMidi(e.target.value);

        document.getElementById('local-upload').onchange = (e) => {
            initAudio();
            const reader = new FileReader();
            reader.onload = (ev) => { parseMidi(ev.target.result, "本機檔案"); toggleSettings(false); };
            reader.readAsArrayBuffer(e.target.files[0]);
        };
    </script>
</body>
</html>
